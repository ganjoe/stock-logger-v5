version: '3.8'

networks:
  telchat-net:
    external: true
    name: telchat_default

services:
  # PTA Telnet Agent
  pta-agent:
    build: .
    container_name: pta_agent_app
    networks:
      - telchat-net
      - default
    command: ["python", "run_pta.py", "--host", "telchat-router"]
    volumes:
      - ./data:/app/data
      - ./secrets:/app/secrets
      - ./logs:/app/logs
      - ./py_pta/llm_config.json:/app/py_pta/llm_config.json
    environment:
      - PYTHONUNBUFFERED=1
    stdin_open: true
    tty: true
    restart: always
